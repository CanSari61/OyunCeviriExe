name: EXE Olustur

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: EXE Olarak Derle
      run: |
        python -m eel app.py web --onefile --noconsole --name "ProOyunCevirmen"

    - name: EXE'yi Indirilebilir Yap
      uses: actions/upload-artifact@v3
      with:
        name: ProOyunCevirmen-Windows
        path: dist/ProOyunCevirmen.exe
